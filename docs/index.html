<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zetaris Sales Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f172a;
      --primary-light: #1e293b;
      --accent: #3b82f6;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --hot: #ef4444;
      --hot-bg: #fef2f2;
      --warm: #f59e0b;
      --warm-bg: #fffbeb;
      --cold: #3b82f6;
      --cold-bg: #eff6ff;
      --radius: 8px;
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--surface-alt);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .header { background: var(--primary); color: white; }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 28px 24px 24px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; }
    .logo h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo span { font-weight: 400; opacity: 0.6; font-size: 0.85rem; margin-left: 8px; }
    .meta-info { font-size: 0.78rem; color: rgba(255,255,255,0.45); text-align: right; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-card { background: var(--primary-light); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 16px; text-align: center; }
    .stat-card .number { font-size: 2rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); font-weight: 500; }
    .stat-card.hot .number { color: var(--hot); }
    .stat-card.warm .number { color: var(--warm); }
    .stat-card.cold .number { color: var(--cold); }
    .stat-card.total .number { color: white; }

    .toolbar { max-width: 1100px; margin: 0 auto; padding: 10px 24px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); }
    .toolbar select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.78rem; font-family: inherit; background: var(--surface); color: var(--text); cursor: pointer; }
    .toolbar select:hover { border-color: var(--accent); }
    .toolbar select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .toolbar-sep { width: 1px; height: 20px; background: var(--border); }
    .toolbar-count { margin-left: auto; font-size: 0.78rem; color: var(--text-muted); font-weight: 500; white-space: nowrap; }

    .content { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .keyword-section { margin-bottom: 32px; }
    .keyword-section h2 { font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); padding: 8px 0; margin-bottom: 12px; border-bottom: 1px solid var(--border); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; transition: box-shadow 0.15s, border-color 0.15s; position: relative; }
    .card:hover { box-shadow: var(--shadow-md); border-color: #cbd5e1; }
    .card .score-indicator { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: var(--radius) 0 0 var(--radius); }
    .card.hot .score-indicator { background: var(--hot); }
    .card.warm .score-indicator { background: var(--warm); }
    .card.cold .score-indicator { background: var(--cold); }

    .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .card-title { flex: 1; font-size: 0.95rem; font-weight: 600; line-height: 1.4; }
    .card-title a { color: var(--text); text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-badges { display: flex; gap: 6px; flex-shrink: 0; }

    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .badge.hot { background: var(--hot-bg); color: var(--hot); }
    .badge.warm { background: var(--warm-bg); color: var(--warm); }
    .badge.cold { background: var(--cold-bg); color: var(--cold); }
    .badge.ch-news { background: #f0fdf4; color: #16a34a; }
    .badge.ch-linkedin { background: #eff6ff; color: #0077b5; }
    .badge.ch-facebook { background: #eef2ff; color: #4f46e5; }
    .badge.ch-reddit { background: #fff7ed; color: #ea580c; }

    .card-meta { display: flex; gap: 16px; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 14px; flex-wrap: wrap; }
    .card-analysis { padding-top: 14px; border-top: 1px solid var(--border); }
    .card-analysis ul { margin: 0 0 12px 18px; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.7; }
    .card-analysis ul li { margin-bottom: 2px; }
    .card-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
    .card-field { font-size: 0.82rem; color: var(--text-secondary); }
    .card-field-label { font-weight: 600; color: var(--text); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 2px; }
    .analysis-text { font-size: 0.85rem; color: var(--text-secondary); white-space: pre-wrap; line-height: 1.7; }
    .no-results { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 0.95rem; }

    footer { max-width: 1100px; margin: 0 auto; padding: 32px 24px; text-align: center; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border); }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .header-top { flex-direction: column; align-items: flex-start; gap: 8px; }
      .meta-info { text-align: left; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-wrap: wrap; }
      .toolbar-sep { display: none; }
      .toolbar-count { margin-left: 0; width: 100%; text-align: right; }
      .card-fields { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .card-badges { flex-wrap: wrap; }
      .toolbar select { flex: 1; min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">Z</div>
          <h1>Sales Intelligence <span>by Zetaris</span></h1>
        </div>
        <div class="meta-info" id="meta-line"></div>
      </div>
      <div class="stats-row">
        <div class="stat-card hot"><div class="number" id="stat-hot">0</div><div class="label">Hot Leads</div></div>
        <div class="stat-card warm"><div class="number" id="stat-warm">0</div><div class="label">Warm</div></div>
        <div class="stat-card cold"><div class="number" id="stat-cold">0</div><div class="label">Cold</div></div>
        <div class="stat-card total"><div class="number" id="stat-total">0</div><div class="label">Total</div></div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <select id="filter-date"></select>
    <div class="toolbar-sep"></div>
    <select id="filter-score">
      <option value="all">All relevance</option>
      <option value="hot">Hot only</option>
      <option value="warm">Warm only</option>
      <option value="cold">Cold only</option>
    </select>
    <select id="filter-channel">
      <option value="all">All channels</option>
      <option value="News">News</option>
      <option value="LinkedIn">LinkedIn</option>
      <option value="Facebook">Facebook</option>
      <option value="Reddit">Reddit</option>
    </select>
    <select id="filter-source"></select>
    <div class="toolbar-sep"></div>
    <select id="filter-sort">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="relevance">Hot first</option>
      <option value="keyword">By keyword</option>
    </select>
    <span class="toolbar-count" id="filter-count"></span>
  </div>

  <div class="content" id="container"><div class="no-results">Loading...</div></div>

  <footer>
    Powered by Llama 3.1 &middot; Groq &middot; GitHub Actions &mdash;
    <a href="https://zetaris.com" target="_blank" rel="noopener">Zetaris</a> Sales Intelligence
  </footer>

  <script>
    let currentData = null;
    let dates = [];

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function getScore(a) {
      if (typeof a === 'object' && a) return (a.lead_score || 'Cold').toLowerCase();
      const s = String(a || '');
      return s.includes('Hot') ? 'hot' : s.includes('Warm') ? 'warm' : 'cold';
    }

    function renderCard(art, keyword) {
      const analysis = art.analysis || {};
      const score = getScore(analysis);
      const channel = art.channel || 'News';
      let h = '<div class="card ' + score + '" data-score="' + score + '" data-source="' + escapeHtml(art.source || '') + '" data-date="' + escapeHtml(art.iso_date || '') + '" data-channel="' + escapeHtml(channel) + '" data-keyword="' + escapeHtml(keyword) + '">';
      h += '<div class="score-indicator"></div>';
      h += '<div class="card-header"><div class="card-title"><a href="' + escapeHtml(art.url) + '" target="_blank" rel="noopener">' + escapeHtml(art.title) + '</a></div>';
      h += '<div class="card-badges"><span class="badge ' + score + '">' + score.toUpperCase() + '</span>';
      h += '<span class="badge ch-' + channel.toLowerCase() + '">' + escapeHtml(channel) + '</span></div></div>';
      h += '<div class="card-meta">';
      if (art.source) h += '<span>' + escapeHtml(art.source) + '</span>';
      if (art.date) h += '<span>' + escapeHtml(art.date) + '</span>';
      if (keyword) h += '<span>' + escapeHtml(keyword) + '</span>';
      h += '</div><div class="card-analysis">';
      if (typeof analysis === 'object' && analysis) {
        if (analysis.summary && analysis.summary.length) h += '<ul>' + analysis.summary.map(s => '<li>' + escapeHtml(s) + '</li>').join('') + '</ul>';
        const f = [];
        if (analysis.company && analysis.company !== 'Not specified') f.push({l:'Company',v:analysis.company});
        if (analysis.pain_point) f.push({l:'Pain Point',v:analysis.pain_point});
        if (analysis.zetaris_relevance) f.push({l:'Zetaris Fit',v:analysis.zetaris_relevance});
        if (f.length) { h += '<div class="card-fields">'; f.forEach(x => { h += '<div class="card-field"><span class="card-field-label">' + x.l + '</span>' + escapeHtml(x.v) + '</div>'; }); h += '</div>'; }
      } else if (analysis) h += '<div class="analysis-text">' + escapeHtml(String(analysis)) + '</div>';
      h += '</div></div>';
      return h;
    }

    function flattenArticles(data) {
      const kw = data.keywords || data, flat = [];
      for (const [k, arts] of Object.entries(kw)) { if (arts && Array.isArray(arts)) arts.forEach(a => flat.push({...a, _keyword: k})); }
      return flat;
    }

    const SO = { hot: 0, warm: 1, cold: 2 };
    function sortArticles(arts, mode) {
      const s = [...arts];
      if (mode === 'newest') s.sort((a,b) => (b.iso_date||'').localeCompare(a.iso_date||''));
      else if (mode === 'oldest') s.sort((a,b) => (a.iso_date||'').localeCompare(b.iso_date||''));
      else if (mode === 'relevance') s.sort((a,b) => (SO[getScore(a.analysis)]??2) - (SO[getScore(b.analysis)]??2));
      else if (mode === 'keyword') s.sort((a,b) => (a._keyword||'').localeCompare(b._keyword||''));
      return s;
    }

    function renderArticles(data) {
      const container = document.getElementById('container');
      const meta = data._metadata || {};
      const sortMode = document.getElementById('filter-sort').value;
      const parts = [];
      if (meta.generated_at) parts.push(meta.generated_at);
      if (meta.fetched_at) parts.push('Fetched ' + meta.fetched_at);
      document.getElementById('meta-line').textContent = parts.join(' · ');
      const all = flattenArticles(data);
      const sources = new Set(); all.forEach(a => { if (a.source) sources.add(a.source); });
      populateSourceFilter([...sources].sort());
      const sorted = sortArticles(all, sortMode);
      if (sortMode === 'keyword') {
        const g = {}; sorted.forEach(a => { if (!g[a._keyword]) g[a._keyword] = []; g[a._keyword].push(a); });
        let html = '';
        for (const [k, arts] of Object.entries(g)) { html += '<div class="keyword-section"><h2>' + escapeHtml(k) + '</h2>'; arts.forEach(a => { html += renderCard(a, ''); }); html += '</div>'; }
        container.innerHTML = html || '<div class="no-results">No articles available.</div>';
      } else {
        if (!sorted.length) { container.innerHTML = '<div class="no-results">No articles available.</div>'; }
        else { let html = '<div class="keyword-section">'; sorted.forEach(a => { html += renderCard(a, a._keyword); }); html += '</div>'; container.innerHTML = html; }
      }
      applyFilters();
    }

    function populateSourceFilter(sources) {
      const sel = document.getElementById('filter-source'), prev = sel.value;
      sel.innerHTML = '<option value="all">All sources</option>';
      sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; if (s === prev) o.selected = true; sel.appendChild(o); });
    }

    function populateDateFilter() {
      const sel = document.getElementById('filter-date');
      sel.innerHTML = '';
      dates.forEach((d, i) => { const o = document.createElement('option'); o.value = d; o.textContent = d.replace('_', ' '); if (i === 0) o.selected = true; sel.appendChild(o); });
    }

    function applyFilters() {
      const sv = document.getElementById('filter-score').value;
      const src = document.getElementById('filter-source').value;
      const ch = document.getElementById('filter-channel').value;
      const cards = document.querySelectorAll('.card');
      const sections = document.querySelectorAll('.keyword-section');
      let vis = 0; const c = { hot:0, warm:0, cold:0 };
      cards.forEach(card => {
        const s = card.getAttribute('data-score')||'', sr = card.getAttribute('data-source')||'', cc = card.getAttribute('data-channel')||'';
        if ((sv==='all'||s===sv)&&(src==='all'||sr===src)&&(ch==='all'||cc===ch)) { card.style.display=''; vis++; if(c[s]!==undefined)c[s]++; }
        else card.style.display='none';
      });
      sections.forEach(s => { s.style.display = s.querySelector('.card:not([style*="display: none"])') ? '' : 'none'; });
      document.getElementById('stat-hot').textContent = c.hot;
      document.getElementById('stat-warm').textContent = c.warm;
      document.getElementById('stat-cold').textContent = c.cold;
      document.getElementById('stat-total').textContent = vis;
      document.getElementById('filter-count').textContent = vis + ' articles';
    }

    async function loadData(dateStr) {
      try {
        const r = await fetch('data/' + dateStr + '.json');
        if (!r.ok) throw new Error();
        currentData = await r.json();
        renderArticles(currentData);
      } catch (e) {
        document.getElementById('container').innerHTML = '<div class="no-results">No data available for ' + dateStr + '</div>';
      }
    }

    async function init() {
      try { const r = await fetch('data/index.json'); if (r.ok) dates = await r.json(); } catch(e) {}
      if (dates.length) { populateDateFilter(); await loadData(dates[0]); }
      else document.getElementById('container').innerHTML = '<div class="no-results">No data yet. Run the workflow to fetch news.</div>';
    }

    document.getElementById('filter-date').addEventListener('change', e => loadData(e.target.value));
    document.getElementById('filter-score').addEventListener('change', applyFilters);
    document.getElementById('filter-channel').addEventListener('change', applyFilters);
    document.getElementById('filter-source').addEventListener('change', applyFilters);
    document.getElementById('filter-sort').addEventListener('change', () => renderArticles(currentData));
    init();
  </script>
</body>
</html>
